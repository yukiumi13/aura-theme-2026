name: Build VSCode VSIX

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - 'v*'
    paths:
      - '.github/workflows/vscode-vsix.yml'
      - 'packages/vscode/**'
      - 'src/ports/vscode/**'
      - 'src/core/colors/schemes/**'
      - 'package.json'
      - 'yarn.lock'

permissions:
  contents: write

jobs:
  build-vsix:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Package VSIX
        working-directory: packages/vscode
        run: npx @vscode/vsce package --out aura-theme-2026.vsix

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: aura-theme-2026-vsix
          path: packages/vscode/aura-theme-2026.vsix

      - name: Attach VSIX to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: packages/vscode/aura-theme-2026.vsix